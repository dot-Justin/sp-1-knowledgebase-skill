# ─── C++ Support ──────────────────────────────────────────────────
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_REQUIRES_FULL_LIBCPP=y

# ─── Peripherals ─────────────────────────────────────────────────
CONFIG_I2C=y
CONFIG_I2S=y
CONFIG_I2S_NRFX_TX_BLOCK_COUNT=8
CONFIG_UART_ASYNC_API=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y
CONFIG_SERIAL=y
CONFIG_GPIO=y
CONFIG_GPIO_HOGS=y
CONFIG_PWM=y
CONFIG_ADC=y
CONFIG_CHARGER=y
CONFIG_REGULATOR=y
CONFIG_REGULATOR_FIXED=y
CONFIG_AUDIO=y
CONFIG_AUDIO_CODEC=y
CONFIG_INPUT=y
CONFIG_INPUT_MODE_SYNCHRONOUS=y
CONFIG_INPUT_ADC_KEYS=y
CONFIG_INPUT_GPIO_KEYS=y
CONFIG_INPUT_LONGPRESS=y

# ─── State Machine Framework ─────────────────────────────────────
CONFIG_SMF=y
CONFIG_SMF_ANCESTOR_SUPPORT=y
CONFIG_SMF_INITIAL_TRANSITION=y

# ─── Power Management ────────────────────────────────────────────
CONFIG_POWEROFF=y
CONFIG_REBOOT=y
CONFIG_PM=y
CONFIG_PM_DEVICE=y

# ─── Storage ─────────────────────────────────────────────────────
CONFIG_DISK_ACCESS=y

# ─── USB (composite: MIDI + CDC ACM console) ────────────────────
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_MIDI2_CLASS=y
CONFIG_MIDI2_UMP_STREAM_RESPONDER=y
CONFIG_USBD_CDC_ACM_CLASS=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n
CONFIG_STDOUT_CONSOLE=y
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_BACKEND_SERIAL_CHECK_DTR=n
CONFIG_SHELL_PROMPT_UART="stem> "
CONFIG_SHELL_STACK_SIZE=2048
CONFIG_SHELL_THREAD_PRIORITY_OVERRIDE=y
CONFIG_SHELL_THREAD_PRIORITY=7
CONFIG_SHELL_LOG_BACKEND=y
CONFIG_LOG_BACKEND_UART=n
CONFIG_USBD_LOG_LEVEL_WRN=y
CONFIG_UDC_DRIVER_LOG_LEVEL_WRN=y
CONFIG_USBD_MIDI2_LOG_LEVEL_DBG=y

# ─── Logging & Diagnostics ───────────────────────────────────────
CONFIG_LOG=y
CONFIG_LOG_BUFFER_SIZE=2048
CONFIG_ASSERT=y
CONFIG_THREAD_NAME=y

# ─── Memory & Threads ────────────────────────────────────────────
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=3072
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_RING_BUFFER=y
CONFIG_USBD_THREAD_STACK_SIZE=768

# ─── Performance ─────────────────────────────────────────────────
CONFIG_SPEED_OPTIMIZATIONS=y
CONFIG_NRF_ENABLE_ICACHE=y
CONFIG_FPU=y
CONFIG_FPU_SHARING=y
